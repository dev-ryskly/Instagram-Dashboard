<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#405DE6" />
      <stop offset="30%" stop-color="#833AB4" />
      <stop offset="70%" stop-color="#E1306C" />
      <stop offset="100%" stop-color="#F77737" />
    </linearGradient>
  </defs>
  <!-- Rounded square with Instagram gradient -->
  <rect width="512" height="512" rx="120" fill="url(#gradient)" />
  <!-- Analytics bar chart icon inside -->
  <g fill="#FFFFFF" transform="translate(136, 136)">
    <rect x="0" y="140" width="50" height="100" rx="10" />
    <rect x="90" y="70" width="50" height="170" rx="10" />
    <rect x="180" y="0" width="50" height="240" rx="10" />
  </g>
</svg>